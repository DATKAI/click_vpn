services:
  vpn-manager:
    build: .
    container_name: vpn-manager
    restart: unless-stopped
    ports:
      - "8080:8000"       # Веб-панель
      - "1194:1194/udp"   # OpenVPN (основной)
      - "1195:1195/udp"   # OpenVPN (дополнительный сервер, если нужен)
    volumes:
      - vpn-data:/data
    environment:
      - DATA_DIR=/data
      - DATABASE_URL=sqlite:////data/vpn.db
      - SECRET_KEY=${SECRET_KEY:-change-me-please-use-strong-random-key}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - TOKEN_EXPIRE_MINUTES=480
    cap_add:
      - NET_ADMIN      # нужно для OpenVPN (tun устройства)
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1

volumes:
  vpn-data:
